name: Sync upstream

on:
  schedule:
    - cron: "0 */12 * * *"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/flowset/flowset-control-community.git
          git fetch upstream main
          git merge upstream/main --no-edit
          git push origin main
